# Saved search profiles for cron jobs.
# Reference these by name when setting up openclaw cron jobs.
#
# Example cron setup:
#   openclaw cron add \
#     --schedule "0 6 * * *" \
#     --prompt "Run the 'tokyo-business' search profile from config/searches.yaml" \
#     --deliver telegram

tokyo-business:
  origin: "SFO"
  destination: "NRT"
  date: "2026-05-01"
  cabin_class: "business"
  airlines:
    - united
    - delta
    - american
